services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - audit-app_web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.optisafe.rule=Host(`${APP_DOMAIN:-optisafe.alsek.fr}`)"
      - "traefik.http.routers.optisafe.entrypoints=websecure"
      - "traefik.http.routers.optisafe.tls.certresolver=letsencrypt"
      - "traefik.http.services.optisafe.loadbalancer.server.port=3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker/index.js"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optisafe}
      POSTGRES_USER: ${POSTGRES_USER:-optisafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optisafe}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  contracts:

networks:
  audit-app_web:
    external: true
  internal:
    driver: bridge
